<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Comfort Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Landing: scrapbook hero (quiz + result added in later steps) -->
    <section
      id="screen-landing"
      class="screen screen--landing"
      aria-label="Welcome"
    >
      <div class="paper paper--base" aria-hidden="true"></div>

      <div class="landing__frame">
        <div id="landing-p5-layer" class="landing-p5-layer" aria-hidden="true"></div>
        <div class="landing__skyline" aria-hidden="true">
          <img src="assets/images/graphic-skyline.png" alt="" />
        </div>
        <div class="landing__decor landing__decor--map" aria-hidden="true"></div>
        <div class="landing__decor landing__decor--tape-stars" aria-hidden="true"></div>

        <div class="landing__collage">
          <div class="hero-oval-stack">
            <div class="hero-oval">
            <span class="hero-oval__tape hero-oval__tape--tl" aria-hidden="true"></span>
            <span class="hero-oval__tape hero-oval__tape--tr" aria-hidden="true"></span>
            <span class="hero-oval__tape hero-oval__tape--bl" aria-hidden="true"></span>
            <span class="hero-oval__tape hero-oval__tape--br" aria-hidden="true"></span>

            <div class="hero-oval__inner">
              <h1 class="hero-oval__title">
                <span class="hero-oval__title-line">NYC</span>
                <span class="hero-oval__title-line">Comfort Finder</span>
              </h1>
              <div class="hero-oval__rule" aria-hidden="true"></div>
              <p class="hero-oval__tagline">Discover Your Inner<br />Comfort in the City</p>

              <div class="leaf-cta">
                <img
                  class="leaf-cta__graphic"
                  src="assets/images/graphic-leaf.png"
                  alt=""
                  aria-hidden="true"
                />
                <button type="button" id="btn-start-quiz" class="btn btn--start">
                  Start Quiz
                </button>
              </div>
            </div>
          </div>
          </div>
        </div>
      </div>
    </section>

    <section
      id="screen-quiz"
      class="screen screen--quiz"
      hidden
      aria-hidden="true"
    >
      <div class="paper paper--base" aria-hidden="true"></div>

      <div class="quiz__wrap">
        <div id="quiz-panel-active" class="quiz-panel quiz-panel--active">
          <header class="quiz-head">
            <button
              type="button"
              id="quiz-btn-back"
              class="btn btn--quiz-back"
            >
              ← Back
            </button>
            <div class="quiz-progress-row">
              <div class="quiz-compass" aria-hidden="true">
                <svg viewBox="0 0 48 48" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="24" cy="24" r="20" fill="#d4c4a8" stroke="#6b5b48" stroke-width="1.5"/>
                  <circle cx="24" cy="24" r="16" fill="#e8dcc8" stroke="#8a7a68" stroke-width="1"/>
                  <path d="M24 10 L26 22 L24 24 L22 22 Z" fill="#5c4a3a"/>
                  <circle cx="24" cy="24" r="2.5" fill="#3a3630"/>
                  <text x="24" y="13" text-anchor="middle" font-size="6" fill="#5c4a3a" font-family="Georgia,serif">N</text>
                </svg>
              </div>
              <p class="quiz-progress-strip" id="quiz-progress-label">
                <span class="quiz-progress-strip__inner">Question 1 of 8</span>
              </p>
              <div class="quiz-head-flowers" aria-hidden="true">
                <svg viewBox="0 0 72 56" width="72" height="56" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8 44c10-12 24-18 38-16" stroke="#7d6b55" stroke-width="1" stroke-linecap="round"/>
                  <circle cx="52" cy="18" r="7" fill="#c4a574" opacity=".85"/>
                  <circle cx="28" cy="28" r="5" fill="#9aab8a" opacity=".9"/>
                  <ellipse cx="44" cy="36" rx="6" ry="4" fill="#b8a090" opacity=".8" transform="rotate(-12 44 36)"/>
                </svg>
              </div>
            </div>
          </header>

          <div class="quiz-question-wrap">
            <div class="quiz-tape quiz-tape--teal quiz-tape--q-left" aria-hidden="true"></div>
            <div class="quiz-tape quiz-tape--teal quiz-tape--q-right" aria-hidden="true"></div>
            <div class="quiz-question-card">
              <p class="quiz-question-text" id="quiz-question-text"></p>
            </div>
          </div>

          <div
            class="quiz-answers"
            id="quiz-answers"
            role="group"
            aria-labelledby="quiz-progress-label"
          ></div>

          <div class="quiz-polaroid" aria-hidden="true">
            <div class="quiz-polaroid__frame">
              <div class="quiz-polaroid__scene"></div>
            </div>
            <div class="quiz-polaroid__pin" aria-hidden="true"></div>
          </div>
        </div>

      </div>
    </section>

    <section
      id="screen-result"
      class="screen screen--result"
      hidden
      aria-hidden="true"
      aria-label="Your comfort type"
    >
      <div class="paper paper--base" aria-hidden="true"></div>

      <div class="result__wrap">
        <div id="result-capture" class="result-capture">
          <div class="result-notebook">
            <div class="result-notebook__pin" aria-hidden="true"></div>

            <div class="result-header-strip">
              <span class="result-header-strip__check" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="12" cy="12" r="11" fill="#6e794e"/>
                  <path d="M7 12.5l3 3 7-7" stroke="#d6d4b3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <h2 class="result-header-strip__title" id="result-title">
                Comfort Type: …
              </h2>
            </div>

            <p class="result-description" id="result-description"></p>

            <p class="result-lead" id="result-lead">Here are a few ideas:</p>

            <ol class="result-suggestions" id="result-suggestions"></ol>
          </div>

          <footer class="result-footer">
            <button type="button" id="btn-retake" class="btn btn--retake">
              Retake Quiz
            </button>
            <div class="result-save">
              <div class="result-save__ribbon" aria-hidden="true"></div>
              <div class="result-save__tape" aria-hidden="true"></div>
              <button type="button" id="btn-save-result" class="btn btn--save-result">
                Save Results
              </button>
            </div>
          </footer>
        </div>
      </div>
    </section>
  </div>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script src="graphics.js"></script>
  <script src="script.js"></script>
</body>
</html>
